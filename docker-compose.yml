services:
  awg-proxy:
    build: .
    container_name: awg-proxy
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.conf.all.src_valid_mark: "1"
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:${PROXY_PORT:-1080}:${PROXY_PORT:-1080}/tcp"
    environment:
      AWG_CONFIG: ${AWG_CONFIG:?AWG_CONFIG env is required}
      WG_QUICK_USERSPACE_IMPLEMENTATION: amneziawg-go
      LOG_LEVEL: debug
      WATCHDOG_INTERVAL: "30"
      WATCHDOG_STALE_THRESHOLD: "180"
      WATCHDOG_LOG_EVERY: "2"
      PROXY_LISTEN_HOST: 0.0.0.0
      PROXY_PORT: ${PROXY_PORT:-1080}
    restart: unless-stopped
